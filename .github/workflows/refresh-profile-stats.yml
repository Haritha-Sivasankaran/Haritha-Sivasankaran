name: Refresh Profile Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches:
      - main
    paths-ignore:
      - "assets/profile-overview.svg"
      - "assets/profile-data.json"

permissions:
  contents: write

concurrency:
  group: profile-stats
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate live profile assets
        # Use a PAT in PROFILE_STATS_TOKEN. GitHub needs read:user on classic PATs
        # when you want private contribution counts to be available to the script.
        env:
          PROFILE_USERNAME: Haritha-Sivasankaran
          PROFILE_TIMEZONE: Asia/Calcutta
          PROFILE_STATS_TOKEN: ${{ secrets.PROFILE_STATS_TOKEN }}
        run: python scripts/generate_profile_assets.py

      - name: Commit refreshed assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/profile-overview.svg assets/profile-data.json README.md assets/profile-wrapped.svg assets/profile-build.svg
          if git diff --staged --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh profile stats"
          git push

      - name: Purge Camo Cache
        run: |
          echo "Locating Camo URLs on the repository page..."
          URLS=$(curl -sSL "https://github.com/${{ github.repository }}/tree/${{ github.ref_name }}" | grep -Eo "https://camo.githubusercontent.com/[a-zA-Z0-9./?=_%:-]*" || true)
          if [ -n "$URLS" ]; then
            # Deduplicate URLs
            UNIQUE_URLS=$(echo "$URLS" | sort -u)
            for url in $UNIQUE_URLS; do
              echo "Purging: $url"
              curl -s -o /dev/null -X PURGE "$url" || true
            done
          else
            echo "No Camo URLs detected."
          fi
