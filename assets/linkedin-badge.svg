<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 44" width="300" height="44">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;700&amp;display=swap');
      .term-text {
        font-family: 'IBM Plex Mono', monospace;
        font-weight: 500;
        font-size: 11px;
        fill: #E2E8F0;
      }
      .term-prompt { fill: #64748B; }
      .term-cmd { fill: #38BDF8; }
      .term-arg { fill: #34D399; }
      
      .cursor {
        fill: #34D399;
        animation: blink 1s step-end infinite;
      }
      .glowing-border {
        animation: pulseBorder 4s infinite ease-in-out;
      }
      .glowing-logo {
        animation: pulseLogo 3s infinite ease-in-out;
      }
      
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes pulseBorder {
        0%, 100% { stroke: #1e293b; }
        50% { stroke: #38bdf8; filter: drop-shadow(0 0 2px rgba(56, 189, 248, 0.3)); }
      }
      @keyframes pulseLogo {
        0%, 100% { fill: #475569; }
        50% { fill: #0077b5; filter: drop-shadow(0 0 3px rgba(0, 119, 181, 0.6)); }
      }
    </style>
    
    <linearGradient id="termBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0b10" />
      <stop offset="100%" stop-color="#050608" />
    </linearGradient>
  </defs>

  <!-- Terminal Card Base -->
  <rect x="1" y="1" width="298" height="42" rx="8" fill="url(#termBg)" stroke="#1e293b" stroke-width="1.2" class="glowing-border" />

  <!-- macOS Window Controls (Terminal Vibe) -->
  <circle cx="16" cy="22" r="3" fill="#EF4444" />
  <circle cx="26" cy="22" r="3" fill="#F59E0B" />
  <circle cx="36" cy="22" r="3" fill="#10B981" />

  <!-- Terminal Prompt & Command -->
  <text x="50" y="26" class="term-text">
    <tspan class="term-prompt">$ </tspan>npx <tspan class="term-cmd">haritha</tspan> <tspan class="term-arg">--connect</tspan>
  </text>

  <!-- Blinking Terminal Cursor -->
  <rect x="210" y="14" width="6" height="13" class="cursor" />

  <!-- LinkedIn Logo (Interactive / Pulsing) -->
  <g transform="translate(262, 10) scale(0.916)" class="glowing-logo">
    <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" />
  </g>
</svg>
