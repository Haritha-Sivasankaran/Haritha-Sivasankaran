<svg width="1100" height="440" viewBox="0 0 1100 440" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Haritha main character build card</title>
  <desc id="desc">A custom profile panel showing Haritha's frontend style, backend discipline, and automation-focused developer vibe.</desc>
  
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap');
      
      .font-sans { font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif; }
      .font-mono { font-family: 'JetBrains Mono', monospace; }
      
      .pulse {
        animation: pulse-glow 1.5s ease-in-out infinite;
      }
      
      @keyframes pulse-glow {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }
    </style>

    <!-- Dot Grid Pattern -->
    <pattern id="dotGrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#1e293b" fill-opacity="0.6" />
    </pattern>
  </defs>

  <!-- Deep Canvas Background -->
  <rect width="1100" height="440" rx="16" fill="#090a0f" />
  <!-- Dot Grid Overlay -->
  <rect width="1100" height="440" rx="16" fill="url(#dotGrid)" />

  <!-- ================= WINDOW 1: BIO (LEFT TOP) ================= -->
  <!-- Hard Shadow -->
  <rect x="48" y="48" width="492" height="172" rx="8" fill="#FF007F" />
  <!-- Main Window -->
  <rect x="40" y="40" width="492" height="172" rx="8" fill="#12131C" stroke="#000000" stroke-width="3" />
  
  <!-- Window Header -->
  <path d="M 41.5 74 L 530.5 74" stroke="#000000" stroke-width="3" />
  <!-- Title -->
  <text x="56" y="62" font-size="12" font-weight="700" fill="#94A3B8" class="font-mono">~/haritha/character.sh</text>
  <!-- Window Controls -->
  <circle cx="514" cy="57" r="6" fill="#EF4444" stroke="#000" stroke-width="1.5" />
  <circle cx="496" cy="57" r="6" fill="#F59E0B" stroke="#000" stroke-width="1.5" />
  <circle cx="478" cy="57" r="6" fill="#10B981" stroke="#000" stroke-width="1.5" />

  <!-- Window Content -->
  <g transform="translate(60, 92)">
    <!-- Character ID Badge -->
    <rect x="0" y="0" width="130" height="22" rx="4" fill="#FF007F" stroke="#000" stroke-width="2" />
    <text x="65" y="15" font-size="10.5" font-weight="800" fill="#000000" text-anchor="middle" class="font-sans">CLASS: FULLSTACK</text>

    <!-- Name -->
    <text x="0" y="46" font-size="28" font-weight="800" fill="#FFFFFF" class="font-sans">Haritha Sivasankaran</text>
    
    <!-- Tagline -->
    <text x="0" y="66" font-size="13" font-weight="500" fill="#94A3B8" class="font-sans">
      frontend taste <tspan fill="#FF007F">•</tspan> backend discipline <tspan fill="#FF007F">•</tspan> automation heavy
    </text>

    <!-- Custom Progress Bar -->
    <g transform="translate(0, 84)">
      <text x="0" y="11" font-size="11" font-weight="700" fill="#00E5FF" class="font-mono">BUILD XP</text>
      <!-- Bar outline -->
      <rect x="75" y="0" width="200" height="14" fill="#1E2030" stroke="#000" stroke-width="2" />
      <!-- Bar fill -->
      <rect x="77" y="2" width="170" height="10" fill="#00FF66" />
      <text x="285" y="11" font-size="11" font-weight="700" fill="#00FF66" class="font-mono">85%</text>
    </g>
  </g>


  <!-- ================= WINDOW 2: SETTINGS (LEFT BOTTOM) ================= -->
  <!-- Hard Shadow -->
  <rect x="48" y="248" width="492" height="152" rx="8" fill="#FACC15" />
  <!-- Main Window -->
  <rect x="40" y="240" width="492" height="152" rx="8" fill="#12131C" stroke="#000000" stroke-width="3" />
  
  <!-- Window Header -->
  <path d="M 41.5 274 L 530.5 274" stroke="#000000" stroke-width="3" />
  <!-- Title -->
  <text x="56" y="262" font-size="12" font-weight="700" fill="#94A3B8" class="font-mono">~/haritha/settings.json</text>
  <!-- Window Controls -->
  <circle cx="514" cy="257" r="6" fill="#EF4444" stroke="#000" stroke-width="1.5" />
  <circle cx="496" cy="257" r="6" fill="#F59E0B" stroke="#000" stroke-width="1.5" />
  <circle cx="478" cy="257" r="6" fill="#10B981" stroke="#000" stroke-width="1.5" />

  <!-- Window Content: JSON style -->
  <g transform="translate(60, 292)" class="font-mono" font-size="12" font-weight="700">
    <!-- JSON Syntax Highlighted -->
    <text x="0" y="16" fill="#E2E8F0">{</text>
    
    <text x="20" y="36">
      <tspan fill="#FF007F">"design_eye"</tspan><tspan fill="#E2E8F0">: </tspan><tspan fill="#00FF66">true</tspan><tspan fill="#E2E8F0">,</tspan>
    </text>
    
    <text x="20" y="56">
      <tspan fill="#FF007F">"bugs_cooked"</tspan><tspan fill="#E2E8F0">: </tspan><tspan fill="#00E5FF">0</tspan><tspan fill="#E2E8F0">,</tspan>
    </text>
    
    <text x="20" y="76">
      <tspan fill="#FF007F">"copy_paste_energy"</tspan><tspan fill="#E2E8F0">: </tspan><tspan fill="#EF4444">false</tspan><tspan fill="#E2E8F0">,</tspan>
    </text>
    
    <text x="20" y="96">
      <tspan fill="#FF007F">"grindset"</tspan><tspan fill="#E2E8F0">: </tspan><tspan fill="#FACC15">"no_cap"</tspan>
    </text>
    
    <text x="0" y="116" fill="#E2E8F0">}</text>
  </g>


  <!-- ================= WINDOW 3: IDE EDITOR (RIGHT TOP) ================= -->
  <!-- Hard Shadow -->
  <rect x="568" y="48" width="492" height="172" rx="8" fill="#00E5FF" />
  <!-- Main Window -->
  <rect x="560" y="40" width="492" height="172" rx="8" fill="#12131C" stroke="#000000" stroke-width="3" />
  
  <!-- Window Header -->
  <path d="M 561.5 74 L 1050.5 74" stroke="#000000" stroke-width="3" />
  <!-- Title -->
  <text x="576" y="62" font-size="12" font-weight="700" fill="#94A3B8" class="font-mono">~/editor/shipping.ts</text>
  <!-- Window Controls -->
  <circle cx="1034" cy="57" r="6" fill="#EF4444" stroke="#000" stroke-width="1.5" />
  <circle cx="1016" cy="57" r="6" fill="#F59E0B" stroke="#000" stroke-width="1.5" />
  <circle cx="998" cy="57" r="6" fill="#10B981" stroke="#000" stroke-width="1.5" />

  <!-- Window Content: Editor style -->
  <g transform="translate(580, 92)" class="font-mono" font-size="11.5" font-weight="700">
    <!-- Line 1 -->
    <text x="0" y="16" fill="#475569">01</text>
    <text x="24" y="16">
      <tspan fill="#FF007F">const</tspan> <tspan fill="#E2E8F0">taste</tspan> <tspan fill="#00E5FF">=</tspan> <tspan fill="#FACC15">"immaculate"</tspan><tspan fill="#E2E8F0">;</tspan> <tspan fill="#64748B" font-weight="400">// frontend default? never.</tspan>
    </text>
    
    <!-- Line 2 -->
    <text x="0" y="40" fill="#475569">02</text>
    <text x="24" y="40">
      <tspan fill="#FF007F">const</tspan> <tspan fill="#E2E8F0">logic</tspan> <tspan fill="#00E5FF">=</tspan> <tspan fill="#FACC15">"bulletproof"</tspan><tspan fill="#E2E8F0">;</tspan> <tspan fill="#64748B" font-weight="400">// zero panic at 100 req/s.</tspan>
    </text>
    
    <!-- Line 3 -->
    <text x="0" y="64" fill="#475569">03</text>
    <text x="24" y="64">
      <tspan fill="#FF007F">const</tspan> <tspan fill="#E2E8F0">speed</tspan> <tspan fill="#00E5FF">=</tspan> <tspan fill="#FACC15">"10x_builder"</tspan><tspan fill="#E2E8F0">;</tspan> <tspan fill="#64748B" font-weight="400">// automation over repetition.</tspan>
    </text>

    <!-- Line 4 -->
    <text x="0" y="88" fill="#475569">04</text>
    <text x="24" y="88">
      <tspan fill="#FF007F">if</tspan> <tspan fill="#E2E8F0">(cooked)</tspan> <tspan fill="#00FF66">ship()</tspan><tspan fill="#E2E8F0">;</tspan> <tspan fill="#FF007F">else</tspan> <tspan fill="#00FF66">cook_more()</tspan><tspan fill="#E2E8F0">;</tspan>
    </text>

    <!-- Prompt line -->
    <text x="0" y="112" fill="#475569">05</text>
    <text x="24" y="112" fill="#00E5FF">❯ <tspan fill="#E2E8F0" class="pulse">_</tspan></text>
  </g>


  <!-- ================= WINDOW 4: VIBES/STATUS (RIGHT BOTTOM) ================= -->
  <!-- Hard Shadow -->
  <rect x="568" y="248" width="492" height="152" rx="8" fill="#FF6B00" />
  <!-- Main Window -->
  <rect x="560" y="240" width="492" height="152" rx="8" fill="#12131C" stroke="#000000" stroke-width="3" />
  
  <!-- Window Header -->
  <path d="M 561.5 274 L 1050.5 274" stroke="#000000" stroke-width="3" />
  <!-- Title -->
  <text x="576" y="262" font-size="12" font-weight="700" fill="#94A3B8" class="font-mono">~/haritha/status.sh</text>
  <!-- Window Controls -->
  <circle cx="1034" cy="257" r="6" fill="#EF4444" stroke="#000" stroke-width="1.5" />
  <circle cx="1016" cy="257" r="6" fill="#F59E0B" stroke="#000" stroke-width="1.5" />
  <circle cx="998" cy="257" r="6" fill="#10B981" stroke="#000" stroke-width="1.5" />

  <!-- Window Content: Cool tags & Branch -->
  <g transform="translate(580, 290)">
    <!-- Quote -->
    <text x="0" y="16" font-size="14.5" font-weight="700" fill="#E2E8F0" class="font-sans">
      "building things that look sharp, work properly,
    </text>
    <text x="0" y="36" font-size="14.5" font-weight="700" fill="#E2E8F0" class="font-sans">
      and make future-me's life 10x easier."
    </text>

    <!-- Branch and Commit Info inside a terminal-like block -->
    <g transform="translate(0, 56)">
      <!-- Branch tag -->
      <rect x="0" y="0" width="94" height="22" rx="4" fill="#1E2030" stroke="#000000" stroke-width="2" />
      <text x="47" y="15" font-size="11" font-weight="700" fill="#00FF66" text-anchor="middle" class="font-mono"> main</text>

      <!-- Commit Hash -->
      <rect x="106" y="0" width="94" height="22" rx="4" fill="#1E2030" stroke="#000000" stroke-width="2" />
      <text x="153" y="15" font-size="11" font-weight="700" fill="#E2E8F0" text-anchor="middle" class="font-mono">SHA: 8ef2a4b</text>

      <!-- Status tag -->
      <rect x="212" y="0" width="130" height="22" rx="4" fill="#1E2030" stroke="#000000" stroke-width="2" />
      <circle cx="225" cy="11" r="3.5" fill="#00FF66" class="pulse" />
      <text x="290" y="15" font-size="11" font-weight="700" fill="#00FF66" text-anchor="middle" class="font-mono">READY TO SHIP</text>
    </g>

    <!-- Gen Z vibe badges -->
    <g transform="translate(0, 92)" class="font-sans" font-size="10.5" font-weight="800">
      <!-- Tag 1 -->
      <rect x="0" y="0" width="126" height="20" rx="3" fill="#FF007F" stroke="#000" stroke-width="1.5" />
      <text x="63" y="14" fill="#000000" text-anchor="middle">immaculate vibes</text>

      <!-- Tag 2 -->
      <rect x="134" y="0" width="116" height="20" rx="3" fill="#00E5FF" stroke="#000" stroke-width="1.5" />
      <text x="192" y="14" fill="#000000" text-anchor="middle">zero fake flex</text>

      <!-- Tag 3 -->
      <rect x="258" y="0" width="116" height="20" rx="3" fill="#00FF66" stroke="#000" stroke-width="1.5" />
      <text x="316" y="14" fill="#000000" text-anchor="middle">cooking 24/7</text>
    </g>
  </g>
</svg>
