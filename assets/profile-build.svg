<svg width="1100" height="440" viewBox="0 0 1100 440" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Haritha main character build card</title>
  <desc id="desc">A custom profile panel showing Haritha's frontend style, backend discipline, and automation-focused developer vibe.</desc>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&amp;family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
      
      .font-sans { font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif; }
      .font-mono { font-family: 'JetBrains Mono', monospace; }
      
      .pulse {
        animation: pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      
      @keyframes pulse-glow {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 0.9; }
      }
    </style>

    <!-- Background Gradients -->
    <linearGradient id="bg" x1="0" y1="0" x2="1100" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070A13" />
      <stop offset="0.5" stop-color="#0B0F19" />
      <stop offset="1" stop-color="#12071B" />
    </linearGradient>
    
    <linearGradient id="cardBg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F172A" stop-opacity="0.7" />
      <stop offset="1" stop-color="#0A0F1D" stop-opacity="0.85" />
    </linearGradient>

    <!-- Border Gradients -->
    <linearGradient id="borderGradient" x1="0" y1="0" x2="1100" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1E293B" stop-opacity="0.8" />
      <stop offset="0.5" stop-color="#334155" stop-opacity="0.3" />
      <stop offset="1" stop-color="#475569" stop-opacity="0.8" />
    </linearGradient>
    
    <linearGradient id="innerCardBorder" x1="0" y1="0" x2="0" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB" stop-opacity="0.2" />
      <stop offset="1" stop-color="#1E293B" stop-opacity="0.1" />
    </linearGradient>

    <!-- Text Gradients -->
    <linearGradient id="frontGradient" x1="0" y1="0" x2="350" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" />
      <stop offset="1" stop-color="#2563EB" />
    </linearGradient>
    
    <linearGradient id="backGradient" x1="0" y1="0" x2="450" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F472B6" />
      <stop offset="1" stop-color="#DB2777" />
    </linearGradient>

    <linearGradient id="bluePink" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#38BDF8" />
      <stop offset="1" stop-color="#EC4899" />
    </linearGradient>

    <linearGradient id="pinkOrange" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#EC4899" />
      <stop offset="1" stop-color="#F97316" />
    </linearGradient>

    <linearGradient id="accentLine" x1="42" y1="235" x2="534" y2="235" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB" />
      <stop offset="0.3" stop-color="#38BDF8" />
      <stop offset="0.7" stop-color="#EC4899" />
      <stop offset="1" stop-color="#F97316" />
    </linearGradient>

    <!-- Glow Filters -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowPink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Card Background -->
  <rect x="2" y="2" width="1096" height="436" rx="24" fill="url(#bg)" stroke="url(#borderGradient)" stroke-width="1.5" />

  <!-- Ambient Glows -->
  <circle cx="100" cy="100" r="120" fill="#2563EB" opacity="0.08" filter="url(#glowCyan)" />
  <circle cx="1000" cy="80" r="140" fill="#DB2777" opacity="0.07" filter="url(#glowPink)" />
  <circle cx="550" cy="380" r="100" fill="#38BDF8" opacity="0.05" filter="url(#glowCyan)" />

  <!-- ================= LEFT COLUMN ================= -->
  <!-- Header Badge -->
  <g transform="translate(42, 34)">
    <rect x="0" y="0" width="180" height="26" rx="13" fill="#0C1324" stroke="url(#bluePink)" stroke-width="1" />
    <text x="90" y="16" font-size="10" font-weight="800" fill="#38BDF8" letter-spacing="1.5" text-anchor="middle" class="font-sans">MAIN CHARACTER BUILD</text>
  </g>

  <!-- Main Headline -->
  <text x="42" y="105" font-size="46" font-weight="800" fill="url(#frontGradient)" letter-spacing="-1" class="font-sans">frontend taste.</text>
  <text x="42" y="156" font-size="46" font-weight="800" fill="url(#backGradient)" letter-spacing="-1" class="font-sans">backend discipline.</text>

  <!-- Description -->
  <text x="42" y="194" font-size="14.5" font-weight="500" fill="#94A3B8" class="font-sans">
    <tspan x="42" dy="0">clean UI in the browser, calm logic behind the scenes.</tspan>
    <tspan x="42" dy="20">automation whenever repetition gets annoying.</tspan>
  </text>

  <!-- Shipping Progress -->
  <rect x="42" y="244" width="492" height="6" rx="3" fill="#141E33" />
  <rect x="42" y="244" width="418" height="6" rx="3" fill="url(#accentLine)" />
  <circle cx="460" cy="247" r="5" fill="#F97316" class="pulse" />

  <text x="42" y="268" font-size="11" font-weight="700" fill="#64748B" class="font-mono">STATUS: SHIPPING</text>
  <text x="534" y="268" font-size="11" font-weight="700" fill="#F97316" class="font-mono" text-anchor="end">BUILD LEVEL: 85%</text>

  <!-- Dev Settings Bento Card -->
  <g transform="translate(42, 290)">
    <rect x="0" y="0" width="238" height="114" rx="18" fill="url(#cardBg)" stroke="url(#innerCardBorder)" stroke-width="1" />
    <text x="18" y="24" font-size="10" font-weight="700" fill="#64748B" letter-spacing="1.2" class="font-mono">DEV SETTINGS</text>
    
    <!-- Setting 1 -->
    <circle cx="22" cy="46" r="3.5" fill="#10B981" />
    <text x="34" y="50" font-size="12" font-weight="600" fill="#94A3B8" class="font-sans">design eye: <tspan fill="#F8FAFC" font-weight="700">on</tspan></text>
    
    <!-- Setting 2 -->
    <circle cx="22" cy="68" r="3.5" fill="#38BDF8" />
    <text x="34" y="72" font-size="12" font-weight="600" fill="#94A3B8" class="font-sans">edge-case fear: <tspan fill="#F8FAFC" font-weight="700">low</tspan></text>
    
    <!-- Setting 3 -->
    <circle cx="22" cy="90" r="3.5" fill="#F43F5E" />
    <text x="34" y="94" font-size="12" font-weight="600" fill="#94A3B8" class="font-sans">boring tolerance: <tspan fill="#F8FAFC" font-weight="700">zero</tspan></text>
  </g>

  <!-- Build Style Bento Card -->
  <g transform="translate(296, 290)">
    <rect x="0" y="0" width="238" height="114" rx="18" fill="url(#cardBg)" stroke="url(#innerCardBorder)" stroke-width="1" />
    <text x="18" y="24" font-size="10" font-weight="700" fill="#64748B" letter-spacing="1.2" class="font-mono">BUILD STYLE</text>
    
    <text x="18" y="58" font-size="26" font-weight="800" fill="url(#bluePink)" class="font-sans" letter-spacing="-0.5">looks good</text>
    <text x="18" y="88" font-size="26" font-weight="800" fill="url(#pinkOrange)" class="font-sans" letter-spacing="-0.5">still works</text>
  </g>


  <!-- ================= RIGHT COLUMN ================= -->
  <!-- IDE Editor Bento Card (Open Tabs) -->
  <g transform="translate(566, 34)">
    <rect x="0" y="0" width="492" height="172" rx="18" fill="url(#cardBg)" stroke="url(#innerCardBorder)" stroke-width="1" />
    
    <!-- IDE Tab Bar -->
    <path d="M 0 14 A 14 14 0 0 1 14 0 L 478 0 A 14 14 0 0 1 492 14 L 492 32 L 0 32 Z" fill="#090E1A" />
    <line x1="0" y1="32" x2="492" y2="32" stroke="#1E293B" stroke-width="1" />
    
    <!-- Tab 1 (Active) -->
    <path d="M 12 32 L 12 12 A 4 4 0 0 1 16 8 L 116 8 A 4 4 0 0 1 120 12 L 120 32 Z" fill="#0F172A" />
    <line x1="16" y1="8" x2="116" y2="8" stroke="#38BDF8" stroke-width="1.5" />
    <!-- Active indicator dot -->
    <circle cx="26" cy="20" r="3" fill="#38BDF8" />
    <text x="36" y="23" font-size="11" font-weight="600" fill="#F8FAFC" class="font-mono">tab_01.ts</text>
    
    <!-- Tab 2 (Inactive) -->
    <text x="146" y="23" font-size="11" font-weight="500" fill="#475569" class="font-mono">tab_02.rs</text>
    
    <!-- Tab 3 (Inactive) -->
    <text x="236" y="23" font-size="11" font-weight="500" fill="#475569" class="font-mono">tab_03.py</text>
    
    <!-- Window controls -->
    <circle cx="446" cy="16" r="4" fill="#EF4444" />
    <circle cx="460" cy="16" r="4" fill="#F59E0B" />
    <circle cx="474" cy="16" r="4" fill="#10B981" />

    <!-- Code Editor Content -->
    <g transform="translate(18, 48)">
      <!-- Line 1 -->
      <text x="0" y="16" font-size="11.5" font-weight="500" fill="#334155" class="font-mono">01</text>
      <text x="24" y="16" font-size="11.5" font-weight="500" class="font-mono">
        <tspan fill="#F43F5E">const</tspan> <tspan fill="#E2E8F0">taste</tspan> <tspan fill="#38BDF8">=</tspan> <tspan fill="#FACC15">"polished UI"</tspan><tspan fill="#E2E8F0">;</tspan> <tspan fill="#64748B">// interfaces feel default? never.</tspan>
      </text>
      
      <!-- Line 2 -->
      <text x="0" y="42" font-size="11.5" font-weight="500" fill="#334155" class="font-mono">02</text>
      <text x="24" y="42" font-size="11.5" font-weight="500" class="font-mono">
        <tspan fill="#F43F5E">const</tspan> <tspan fill="#E2E8F0">logic</tspan> <tspan fill="#38BDF8">=</tspan> <tspan fill="#FACC15">"calm flows"</tspan><tspan fill="#E2E8F0">;</tspan>  <tspan fill="#64748B">// stable under real-world usage.</tspan>
      </text>
      
      <!-- Line 3 -->
      <text x="0" y="68" font-size="11.5" font-weight="500" fill="#334155" class="font-mono">03</text>
      <text x="24" y="68" font-size="11.5" font-weight="500" class="font-mono">
        <tspan fill="#F43F5E">const</tspan> <tspan fill="#E2E8F0">hustle</tspan> <tspan fill="#38BDF8">=</tspan> <tspan fill="#FACC15">"automation"</tspan><tspan fill="#E2E8F0">;</tspan> <tspan fill="#64748B">// repetitive tasks = one-click.</tspan>
      </text>

      <!-- Line 4 (Empty/Prompt) -->
      <text x="0" y="94" font-size="11.5" font-weight="500" fill="#334155" class="font-mono">04</text>
      <text x="24" y="94" font-size="11.5" font-weight="500" fill="#38BDF8" class="font-mono">❯ <tspan fill="#E2E8F0" class="pulse">_</tspan></text>
    </g>
  </g>

  <!-- Current Patch Bento Card -->
  <g transform="translate(566, 222)">
    <rect x="0" y="0" width="492" height="182" rx="18" fill="url(#cardBg)" stroke="url(#innerCardBorder)" stroke-width="1" />
    
    <text x="20" y="26" font-size="10" font-weight="700" fill="#64748B" letter-spacing="1.2" class="font-mono">CURRENT PATCH</text>
    
    <!-- Pills Row -->
    <g transform="translate(20, 40)">
      <!-- Pill 1 -->
      <rect x="0" y="0" width="138" height="22" rx="11" fill="#38BDF8" fill-opacity="0.08" stroke="#38BDF8" stroke-opacity="0.25" />
      <text x="69" y="15" font-size="10" font-weight="700" fill="#38BDF8" text-anchor="middle" class="font-sans">ui that feels premium</text>
      
      <!-- Pill 2 -->
      <rect x="146" y="0" width="138" height="22" rx="11" fill="#F472B6" fill-opacity="0.08" stroke="#F472B6" stroke-opacity="0.25" />
      <text x="215" y="15" font-size="10" font-weight="700" fill="#F472B6" text-anchor="middle" class="font-sans">backend that behaves</text>
      
      <!-- Pill 3 -->
      <rect x="292" y="0" width="112" height="22" rx="11" fill="#FB923C" fill-opacity="0.08" stroke="#FB923C" stroke-opacity="0.25" />
      <text x="348" y="15" font-size="10" font-weight="700" fill="#FB923C" text-anchor="middle" class="font-sans">automation brain</text>
    </g>

    <!-- Quote/Vibe description -->
    <text x="20" y="98" font-size="14.5" font-weight="500" fill="#CBD5E1" class="font-sans">
      <tspan x="20" dy="0">"building things that look sharp, work properly, and</tspan>
      <tspan x="20" dy="22">make future-me's life 10x easier."</tspan>
    </text>

    <!-- Git/Branch details -->
    <g transform="translate(20, 150)" class="font-mono">
      <path d="M 0 3 L 4 3 C 6 3, 6 9, 8 9 L 16 9" stroke="#64748B" stroke-width="1.5" fill="none" />
      <circle cx="16" cy="9" r="2.5" fill="#10B981" />
      <text x="26" y="12" font-size="10.5" fill="#64748B">branch: <tspan fill="#10B981" font-weight="600">main</tspan></text>
      
      <!-- Commit hash -->
      <text x="140" y="12" font-size="10.5" fill="#475569">|</text>
      <text x="156" y="12" font-size="10.5" fill="#64748B">commit: <tspan fill="#E2E8F0">8ef2a4b</tspan></text>
      
      <!-- Status -->
      <text x="280" y="12" font-size="10.5" fill="#475569">|</text>
      <circle cx="298" cy="8.5" r="3.5" fill="#10B981" class="pulse" />
      <text x="308" y="12" font-size="10.5" font-weight="600" fill="#10B981">ready to ship</text>
    </g>
  </g>

  <!-- ================= BOTTOM BAR ================= -->
  <line x1="42" y1="416" x2="1058" y2="416" stroke="#1E293B" stroke-width="1" />
  <text x="550" y="431" font-size="11.5" font-weight="700" fill="#64748B" letter-spacing="1.5" text-anchor="middle" class="font-sans">CLEAN VISUALS  •  STABLE FLOWS  •  NO COPY-PASTE ENERGY</text>
</svg>
