<svg width="855" height="570" viewBox="0 0 855 570" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Nothing OS Telemetry Widget</title>
  <desc id="desc">Nothing OS minimalist retro-monochrome telemetry dashboard.</desc>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&amp;family=DotGothic16&amp;family=Plus+Jakarta+Sans:wght@700;800&amp;display=swap');
      .font-sans { font-family: 'Plus Jakarta Sans', sans-serif; }
      .font-mono { font-family: 'IBM Plex Mono', monospace; }
      .font-dot { font-family: 'DotGothic16', monospace; }
      
      .nothing-red-blink {
        animation: pulseRed 2s infinite;
      }
      @keyframes pulseRed {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
    </style>
    <pattern id="gridLines" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#121212" stroke-width="0.8" />
    </pattern>
  </defs>

  <!-- Outer shell -->
  <rect width="855" height="570" rx="10" fill="#080809" stroke="#222" stroke-width="1.5" />
  <rect width="855" height="570" rx="10" fill="url(#gridLines)" />

  <!-- Arc top Address URL bar -->
  <g transform="translate(20, 20)">
    <rect width="815" height="30" rx="6" fill="#000000" stroke="#222" stroke-width="1" />
    <text x="15" y="19" font-size="11" fill="#555" class="font-mono">haritha://<tspan fill="#ffffff">telemetry.nothing</tspan></text>
    
    <!-- Blink status dot -->
    <circle cx="790" cy="15" r="3.5" fill="#eb4034" class="nothing-red-blink" />
    <text x="778" y="18" font-size="9" fill="#eb4034" font-weight="700" text-anchor="end" class="font-mono">MONOCHROME SYNC</text>
  </g>

  <!-- Content Area -->
  <g transform="translate(20, 75)">
    <!-- Title -->
    <text x="0" y="30" font-size="28" font-weight="800" fill="#ffffff" class="font-sans">telemetry.log</text>
    <text x="0" y="48" font-size="9" font-weight="700" fill="#eb4034" letter-spacing="1.5" class="font-mono">SYSTEM REFRESHED ON 13 JUL 2026</text>

    <!-- CARD 1: ANNUAL GRIND -->
    <g transform="translate(0, 75)">
      <rect width="400" height="230" rx="12" fill="#000" stroke="#222" stroke-width="1" />
      <line x1="20" y1="20" x2="30" y2="20" stroke="#eb4034" stroke-width="2.5" stroke-linecap="round" />
      <text x="40" y="24" font-size="9.5" font-weight="700" fill="#eb4034" letter-spacing="1.2" class="font-mono">01 / TOTAL ANNUAL ENERGY</text>
      
      <!-- Large matrix number -->
      <text x="20" y="90" font-size="52" fill="#ffffff" class="font-dot">460</text>
      <text x="20" y="112" font-size="11" fill="#555" class="font-sans">total commits / actions in last 365 days</text>

      <!-- Stats list -->
      <g transform="translate(20, 140)" fill="#ffffff" class="font-mono" font-size="12">
        <text x="0" y="15" fill="#555">ACTIVE DAYS:</text>
        <text x="120" y="15" font-weight="700" fill="#ffffff" class="font-dot">43 DAYS</text>

        <text x="0" y="38" fill="#555">PEAK DAY:</text>
        <text x="120" y="38" font-weight="700" fill="#ffffff" class="font-dot">46 COMMITS</text>

        <text x="0" y="61" fill="#555">STAR COUNT:</text>
        <text x="120" y="61" font-weight="700" fill="#ffffff" class="font-dot">2 STARS</text>
      </g>
    </g>

    <!-- CARD 2: CODE FREQUENCIES -->
    <g transform="translate(420, 75)">
      <rect width="395" height="230" rx="12" fill="#000" stroke="#222" stroke-width="1" />
      <line x1="20" y1="20" x2="30" y2="20" stroke="#eb4034" stroke-width="2.5" stroke-linecap="round" />
      <text x="40" y="24" font-size="9.5" font-weight="700" fill="#eb4034" letter-spacing="1.2" class="font-mono">02 / LANGUAGE CODE STACK</text>
      
      <!-- Monochrome Language Rows -->
      <g transform="translate(20, 50)">
        
        <g transform="translate(0, 0)">
          <text x="0" y="15" font-size="11" font-weight="700" fill="#ffffff" class="font-mono">JUPYTER NOTEBOOK</text>
          <text x="350" y="15" font-size="11" font-weight="700" fill="#7f7f7f" class="font-mono" text-anchor="end">21.1%</text>
          <!-- Dot-matrix background track -->
          <line x1="0" y1="26" x2="350" y2="26" stroke="#1a1a1a" stroke-width="6" stroke-dasharray="1 4" stroke-linecap="round" />
          <!-- Dot-matrix active track -->
          <line x1="0" y1="26" x2="73" y2="26" stroke="#ffffff" stroke-width="6" stroke-dasharray="1 4" stroke-linecap="round" />
        </g>
        

        <g transform="translate(0, 34)">
          <text x="0" y="15" font-size="11" font-weight="700" fill="#ffffff" class="font-mono">JAVASCRIPT</text>
          <text x="350" y="15" font-size="11" font-weight="700" fill="#7f7f7f" class="font-mono" text-anchor="end">18.7%</text>
          <!-- Dot-matrix background track -->
          <line x1="0" y1="26" x2="350" y2="26" stroke="#1a1a1a" stroke-width="6" stroke-dasharray="1 4" stroke-linecap="round" />
          <!-- Dot-matrix active track -->
          <line x1="0" y1="26" x2="65" y2="26" stroke="#ffffff" stroke-width="6" stroke-dasharray="1 4" stroke-linecap="round" />
        </g>
        

        <g transform="translate(0, 68)">
          <text x="0" y="15" font-size="11" font-weight="700" fill="#ffffff" class="font-mono">TYPESCRIPT</text>
          <text x="350" y="15" font-size="11" font-weight="700" fill="#7f7f7f" class="font-mono" text-anchor="end">16.1%</text>
          <!-- Dot-matrix background track -->
          <line x1="0" y1="26" x2="350" y2="26" stroke="#1a1a1a" stroke-width="6" stroke-dasharray="1 4" stroke-linecap="round" />
          <!-- Dot-matrix active track -->
          <line x1="0" y1="26" x2="56" y2="26" stroke="#ffffff" stroke-width="6" stroke-dasharray="1 4" stroke-linecap="round" />
        </g>
        

        <g transform="translate(0, 102)">
          <text x="0" y="15" font-size="11" font-weight="700" fill="#ffffff" class="font-mono">JAVA</text>
          <text x="350" y="15" font-size="11" font-weight="700" fill="#7f7f7f" class="font-mono" text-anchor="end">15.2%</text>
          <!-- Dot-matrix background track -->
          <line x1="0" y1="26" x2="350" y2="26" stroke="#1a1a1a" stroke-width="6" stroke-dasharray="1 4" stroke-linecap="round" />
          <!-- Dot-matrix active track -->
          <line x1="0" y1="26" x2="53" y2="26" stroke="#ffffff" stroke-width="6" stroke-dasharray="1 4" stroke-linecap="round" />
        </g>
        

        <g transform="translate(0, 136)">
          <text x="0" y="15" font-size="11" font-weight="700" fill="#ffffff" class="font-mono">PYTHON</text>
          <text x="350" y="15" font-size="11" font-weight="700" fill="#7f7f7f" class="font-mono" text-anchor="end">14.7%</text>
