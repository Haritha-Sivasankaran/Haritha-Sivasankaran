          <!-- Dot-matrix active track -->
          <line x1="0" y1="26" x2="51" y2="26" stroke="#ffffff" stroke-width="6" stroke-dasharray="1 4" stroke-linecap="round" />
        </g>
        
      </g>
    </g>

